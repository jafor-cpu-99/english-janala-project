<section class="flex justify-center items-center">
    <div class="">

        <p class="text-[24px] text-[#18181B] mb-5">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা <br>আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে <br>যাবে অন্য একটি Level এ</p>
       <input type="text" name="" id="" placeholder="Enter your name"  class="mb-4 rounded-md w-[320px] h-[40px] px-2"><br>
        <input type="password" name="" id="" placeholder="Enter your password" class="mb-4 rounded-md w-[320px] h-[40px] px-2"><br>
        <button class="btn btn-primary">Get Started</button>
    </div>
    <div class="ml-90">
